services:
  app:
    build: .
    ports:
      - "3001:3001"
    volumes:
      - lego_data:/app/data
    environment:
      NODE_ENV: production
      PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/programs"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  lego_data:
    driver: local
